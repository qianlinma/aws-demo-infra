# 这个 buildspec 专门给 backend Test stage 使用。
# 它只运行 unit tests，不 build Docker image，也不 push ECR。
version: 0.2

# phases 里面放 CodeBuild 的执行阶段。
phases:
  # install 阶段用来准备测试环境。
  install:
    # runtime-versions 告诉 CodeBuild 使用哪个语言运行时。
    # backend 的 pom.xml 要求 Java 21，所以这里必须选择 corretto21。
    runtime-versions:
      # corretto21 是 AWS 提供的 Java 21 运行时。
      java: corretto21

  # build 阶段是真正执行测试命令的地方。
  build:
    # commands 里面是一条一条 shell 命令，CodeBuild 会按顺序执行。
    commands:
      # 运行 backend 的 Maven unit tests。
      # 如果任何 test 失败，这个 Test stage 会失败，后面的 Build 和 Deploy 都不会继续。
      - ./mvnw test

# reports 告诉 CodeBuild 去哪里读取测试报告。
# Maven Surefire 默认会把 unit test 结果写到 target/surefire-reports/*.xml。
reports:
  # backend-unit-tests 是我们给这组测试报告起的名字，会显示在 CodeBuild 的 Reports tab 里。
  backend-unit-tests:
    # files 是要收集的测试报告文件。
    files:
      # TEST-*.xml 是 Maven Surefire 生成的 JUnit XML 报告文件。
      - "TEST-*.xml"
    # base-directory 是报告文件所在目录。
    base-directory: "target/surefire-reports"
    # file-format 告诉 CodeBuild 这些 XML 是 JUnit 格式。
    file-format: JUNITXML
